<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d1f19" />
    <title>Offline — Mohanoe Inc. Attorneys</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, 'Segoe UI', Arial, sans-serif;
        color: #10241b;
        background: linear-gradient(180deg, #0d1f19 0%, #f4f7f4 18%, #edf2ed 100%);
      }
      .card {
        max-width: 420px;
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(16, 36, 27, 0.1);
        box-shadow: 0 18px 45px rgba(9, 22, 15, 0.1);
        text-align: center;
      }
      h1 { margin: 0 0 12px; font-size: 1.5rem; color: #0d1f19; }
      p { margin: 0 0 20px; line-height: 1.6; color: #52635b; }
      button {
        padding: 12px 20px;
        border: none;
        border-radius: 14px;
        font-weight: 700;
        color: #f8fff9;
        background: linear-gradient(135deg, #1b7a58, #0f5d43);
        cursor: pointer;
      }
      button:focus-visible {
        outline: 3px solid rgba(27, 122, 88, 0.45);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>
        Mohanoe Legal needs a network connection for intake, cases, and
        operations. Cached pages may still be available when you reconnect.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
